version: 2
project_name: ridewithgps-pp-cli
changelog:
  disable: true
builds:
  - id: ridewithgps-pp-cli
    main: ./cmd/ridewithgps-pp-cli
    binary: ridewithgps-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/ridewithgps/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ridewithgps-pp-mcp
    main: ./cmd/ridewithgps-pp-mcp
    binary: ridewithgps-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ridewithgps-pp-cli
    repository:
      owner: stellato
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Your whole Ride with GPS library, offline — bulk export, gear mileage, and ride analytics no other tool ships."
    install: |
      bin.install "ridewithgps-pp-cli"
      bin.install "ridewithgps-pp-mcp"

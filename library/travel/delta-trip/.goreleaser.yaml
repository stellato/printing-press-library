version: 2
project_name: delta-trip-pp-cli
changelog:
  disable: true
builds:
  - id: delta-trip-pp-cli
    main: ./cmd/delta-trip-pp-cli
    binary: delta-trip-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/delta-trip/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: delta-trip-pp-mcp
    main: ./cmd/delta-trip-pp-mcp
    binary: delta-trip-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: delta-trip-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Look up and manage Delta Air Lines trips by confirmation number — view all flights, seats, baggage, upgrade..."
    install: |
      bin.install "delta-trip-pp-cli"
      bin.install "delta-trip-pp-mcp"

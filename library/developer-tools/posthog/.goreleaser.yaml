version: 2
project_name: posthog-pp-cli
changelog:
  disable: true
builds:
  - id: posthog-pp-cli
    main: ./cmd/posthog-pp-cli
    binary: posthog-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/posthog/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: posthog-pp-mcp
    main: ./cmd/posthog-pp-mcp
    binary: posthog-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: posthog-pp-cli
    repository:
      owner: riteshtiwari
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every PostHog resource in one CLI — with offline search, agent-native output, and cross-resource analytics no..."
    install: |
      bin.install "posthog-pp-cli"
      bin.install "posthog-pp-mcp"

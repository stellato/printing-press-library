version: 2
project_name: rappi-pp-cli
changelog:
  disable: true
builds:
  - id: rappi-pp-cli
    main: ./cmd/rappi-pp-cli
    binary: rappi-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/food-and-dining/rappi/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: rappi-pp-mcp
    main: ./cmd/rappi-pp-mcp
    binary: rappi-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: rappi-pp-cli
    repository:
      owner: bobeglz
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The first agent-native CLI for Rappi Mexico — read-only catalog browsing with offline SQLite snapshots, cross-city..."
    install: |
      bin.install "rappi-pp-cli"
      bin.install "rappi-pp-mcp"

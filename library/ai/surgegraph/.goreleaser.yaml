version: 2
project_name: surgegraph-pp-cli
changelog:
  disable: true
builds:
  - id: surgegraph-pp-cli
    main: ./cmd/surgegraph-pp-cli
    binary: surgegraph-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/ai/surgegraph/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: surgegraph-pp-mcp
    main: ./cmd/surgegraph-pp-mcp
    binary: surgegraph-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: surgegraph-pp-cli
    repository:
      owner: surgegraph
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "SurgeGraph is the Answer Engine Optimization (AEO) platform that tracks AI citations, scores pages for citation readiness, and one-click fixes the gaps — now every workflow runs from the terminal or any agent."
    install: |
      bin.install "surgegraph-pp-cli"
      bin.install "surgegraph-pp-mcp"

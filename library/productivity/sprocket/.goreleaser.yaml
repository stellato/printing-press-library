version: 2
project_name: sprocket-pp-cli
changelog:
  disable: true
builds:
  - id: sprocket-pp-cli
    main: ./cmd/sprocket-pp-cli
    binary: sprocket-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/sprocket/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: sprocket-pp-mcp
    main: ./cmd/sprocket-pp-mcp
    binary: sprocket-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: sprocket-pp-cli
    repository:
      owner: stellato
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Your youth-soccer club's schedule, teams, and dues from the terminal — with merged multi-kid agendas, conflict detection"
    install: |
      bin.install "sprocket-pp-cli"
      bin.install "sprocket-pp-mcp"

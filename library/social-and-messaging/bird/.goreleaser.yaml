version: 2
project_name: bird-pp-cli
changelog:
  disable: true
builds:
  - id: bird-pp-cli
    main: ./cmd/bird-pp-cli
    binary: bird-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/social-and-messaging/bird/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: bird-pp-mcp
    main: ./cmd/bird-pp-mcp
    binary: bird-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: bird-pp-cli
    repository:
      owner: cleverai-zh
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "A terminal-native CLI for Bird's Conversations and SMS APIs, with offline search, batch reconcile, and a local..."
    install: |
      bin.install "bird-pp-cli"
      bin.install "bird-pp-mcp"

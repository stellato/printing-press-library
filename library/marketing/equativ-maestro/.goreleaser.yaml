version: 2
project_name: equativ-maestro-pp-cli
changelog:
  disable: true
builds:
  - id: equativ-maestro-pp-cli
    main: ./cmd/equativ-maestro-pp-cli
    binary: equativ-maestro-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/equativ-maestro/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: equativ-maestro-pp-mcp
    main: ./cmd/equativ-maestro-pp-mcp
    binary: equativ-maestro-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: equativ-maestro-pp-cli
    repository:
      owner: stellato
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Maestro deal, avails forecast, and report — scriptable"
    install: |
      bin.install "equativ-maestro-pp-cli"
      bin.install "equativ-maestro-pp-mcp"

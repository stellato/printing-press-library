                          symbol: btc
                        balances:
                          - id: 104
                            date: "2026-01-01"
                            balance: "53124.7200"
                            currency: usd
                            to_base: 53124.72
                            crypto_balance: "0.852341920145782301"
                      - source:
                          type: crypto_synced
                          crypto_synced_id: 33004
                          symbol: btc
                        balances:
                          - id: 105
                            date: "2026-01-01"
                            balance: "6231.2800"
                            currency: usd
                            to_base: 6231.28
                            crypto_balance: "0.100020003000400050"
                      - source:
                          type: deleted
                          deleted_account_id: 91
                          name: Savings
                          institution_name: Old Bank
                          display_name: Closed Savings
                          account_type: savings
                          subtype: savings

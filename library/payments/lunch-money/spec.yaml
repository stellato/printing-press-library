openapi: 3.0.2
x-mcp:
  transport: [stdio, http]
  orchestration: code
  endpoint_tools: hidden
info:
  title: Lunch Money API - v2
  description: |-
    Welcome to the documentation for the "next version" of the Lunch Money v2 API.This documentation includes proposed updates to the API design that have not yet been released.<p>
    This documentation is for the **v2.11.0** release of the API.<p>
    
    See the [version history](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/version-history) for what is new in this release.
    New functionality may only be available in the Mock Service until the release is finalized. <br><br>

    The latest complete implementation of the spec is for the **v2.8.5** release and can be found [here](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/). <br><br>
    Feedback on any of the API design is welcome, but we are particularly interested in getting feedback on most recent changes in the [version history](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/version-history).

    ------------------------------------------------------------------------------------------------
    Welcome to the Lunch Money v2 API.

    A working version of this API is now available through these docs, or directly at:

    `https://api.lunchmoney.dev/v2`

    <span class="red-text"><strong>This is in alpha launch of a major API update. It is still subject to change during this alpha review 
    period and bugs may still exist. We strongly encourage users to use the mock service or create a test budget with sample data as the first step to interacting with the v2 API.</strong></span>
    See the [Getting Started Guide](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/getting-started) for more information on using a test budget.<p>

    If you are new to the v2 API, you may wish to review the [v2 API Overview of Changes](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/changelog).

    ### Static Mock Server

    You may also use these docs to explore the API using a static mock server endpoint.<p> 
    This will allow you to become familiar with the API without having to create an access token, and eliminates the possibility of changing real data. <p>
    To access this endpoint, select the second endpoint in the "Server" dropdown to the right. When selected, you should see "Static Mock v2 Lunch Money API Server".<br>
    When using this server, set your Bearer token to any string with 11 or more characters.

    ### Migrating from V1

    The v2 API is NOT backwards compatible with the v1 API. We encourage developers to review the [Migration Guide](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/migration-guide) to understand the changes and plan their migration.

    ### Acknowledgments

    If you have provided feedback on the API during our ongoing design process, **THANK YOU**. We are thrilled that you can finally interact with the working API we built based on your feedback.
    
    ### Useful links:
    - [Getting Started](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/getting-started)
    - [v2 API Changelog](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/changelog)
    - [Migration Guide](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/migration-guide)
    - [Rate Limits](https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/rate-limits)
    - [Current v1 Lunch Money API Documentation](https://lunchmoney.dev)
    - [Awesome Lunch Money Projects](https://github.com/lunch-money/awesome-lunchmoney?tab=readme-ov-file)
  termsOfService: https://lunchmoney.dev/#current-status
  contact:
    email: devsupport@lunchmoney.app
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 2.11.0

servers:
  - url: https://api.lunchmoney.dev/v2
    description: v2 Lunch Money API Server - changes will affect real data!
#  - url: https://mock.lunchmoney.dev/v2
  - url: https://lm-v2-api-next-a7fabcab8e9a.herokuapp.com/v2/
    description: Static mock version of the v2 Lunch Money API Server

tags:
  - name: me
    description: View details and settings for the current user and account
  - name: categories
    description: Work with categories
    externalDocs:
      description: Learn more about categories
      url: https://support.lunchmoney.app/setup/categories
  - name: manual_accounts
    description: Work with manually managed accounts (formerly called assets)
    externalDocs:
      description: Learn more about manual accounts
      url: https://support.lunchmoney.app/setup/linked-accounts#how-are-manually-managed-account-balances-updated
  - name: plaid_accounts
    description: Work with accounts synced through Plaid
    externalDocs:
      description: Learn more about synced accounts
      url: https://support.lunchmoney.app/setup/linked-accounts#how-often-should-i-expect-new-transactions-to-get-imported
  - name: crypto-manual
    description: Work with manually managed crypto assets
    externalDocs:
      description: Learn more about crypto assets
      url: https://support.lunchmoney.app/setup/crypto
  - name: crypto-synced
    description: Read and refresh synced crypto assets and balances. Creating and managing connections with synced crypto providers is done exclusively in the Lunch Money web app.
    externalDocs:
      description: Learn more about crypto assets
      url: https://support.lunchmoney.app/setup/crypto
  - name: balance_history
    description: View and update historical account balances. Balance history is what drives the [Net Worth](https://my.lunchmoney.app/net-worth) views in the Lunch Money app. Balance history is generated for each account's balance on the first day of each month and can be edited in the Lunch Money app or via the API.
  - name: recurring_items
    description: Work with recurring items
    externalDocs:
      url: https://support.lunchmoney.app/finances/recurring-items
  - name: tags
    description: Work with tags
    externalDocs:
      description: Learn more about tags
      url: https://support.lunchmoney.app/setup/tags
  - name: transactions
    description: Work with transactions
    externalDocs:
      description: Learn more about transactions
      url: https://support.lunchmoney.app/finances/transactions
  - name: transactions (bulk)
    description: Perform bulk actions on transactions
    externalDocs:
      description: Learn more about transactions
      url: https://support.lunchmoney.app/finances/transactions
  - name: transactions (group)
    description: Group or ungroup transactions
    externalDocs:
      description: Learn more about transactions
      url: https://support.lunchmoney.app/finances/transactions
  - name: transactions (split)
    description: Split or unsplit transactions
    externalDocs:
      description: Learn more about transactions
      url: https://support.lunchmoney.app/finances/transactions
  - name: transactions (files)
    description: Manage files attached to transactions
    externalDocs:
      description: Learn more about transactions
      url: https://support.lunchmoney.app/finances/transactions
  - name: budgets
    description: View settings and modify budget amounts.<p> Use the
      [/summary](#tag/summary) endpoint to view the budget details performance.
    externalDocs:
      description: Learn more about budgets
      url: https://support.lunchmoney.app/finances/budgets
  - name: summary
    description: View a summary of the user's budget

components:
  schemas:

    userObject:
      type: object
      title: user object (returned by /me)
      additionalProperties: false
      properties: 
        name:
          type: string
          description: The user's name
        email:
          type: string
          description: The user's email
        id:
          type: integer
          format: int32
          description: Unique ID for the user
        account_id:
          type: integer
          format: int64
          description: Unique ID for the linked budgeting account
        budget_name:
          type: string
          description: Name of the linked budgeting account
        primary_currency:
          description: Primary currency set in the user's settings
          allOf:
            - $ref: "#/components/schemas/currencyEnum"
        api_key_label:
          type: string
          nullable: true
          description: Label assigned by the user to the API key being used.
            Returns null if no label is set
      required:
        - name
        - email
        - id
        - account_id
        - budget_name
        - primary_currency
        - api_key_label

    categoryObject:
          type: object
          title: category object
          additionalProperties: false
          properties:
            id:
              type: integer
              format: int32
              nullable: false
              description: System defined unique ID for the category
            name:
              type: string
              nullable: false
              description: Name of the category
              minLength: 1
              maxLength: 100
            description:
              type: string
              nullable: true
              description: Category description, or `null` if none is set
              maxLength: 200
            is_income:
              type: boolean
              nullable: false
              description: 'If `true`, transactions in this category are treated
                as income. (See [Category
                Properties](https://support.lunchmoney.app/setup/categories/category-properties)
                for details)'
            exclude_from_budget:
              type: boolean
              nullable: false
              description: 'If `true`, transactions in this category are
                excluded from the budget. (See [Category
                Properties](https://support.lunchmoney.app/setup/categories/category-properties)
                for details)'
            exclude_from_totals:
              type: boolean
              nullable: false
              description: 'If `true`, transactions in this category are
                excluded from totals. (See [Category
                Properties](https://support.lunchmoney.app/setup/categories/category-properties)
                for details)'
            updated_at:
              type: string
              format: date-time
              nullable: false
              description: Date and time the category was last updated (in the
                ISO 8601 extended format).
            created_at:
              type: string
              format: date-time
              nullable: false
              description: Date and time of when the category was created (ISO
                8601 extended format).
            group_id:
              type: integer
              format: int64
              nullable: true
              description: ID of the category group this category belongs to, or
                `null` if it does not belong to a group, or is itself a group.
            is_group:
              type: boolean
              description: If `true`, this category is created as a category
                group
            children:
              type: array
              items:
                $ref: "#/components/schemas/childCategoryObject"
              description: For category groups, contains details about the
                categories in the group. These objects are similar to Category
                Objects but the `is_group` property will always be `false`, and
                there will be no `children` attribute.
            archived:
              type: boolean
              description: If true, the category is archived and hidden in
                relevant areas of the Lunch Money app.
            archived_at:
              type: string
              format: date-time
              nullable: true
              description: Date and time the category was last archived ( ISO
                8601 extended format).
            order:
              type: integer
              nullable: true
              default: null
              description: "Position of the category on the categories page in
                the Lunch Money app. For grouped categories, the order is
                relative to others in the same group.<br>
                Categories with `order: null` are shown alphabetically before ordered categories"
            collapsed:
              type: boolean
              nullable: false
              default: false
              description: If `true`, the category appears collapsed in the
                Lunch Money app
          required:
            - id
            - name
            - description
            - is_income
            - exclude_from_budget
            - exclude_from_totals
            - updated_at
            - created_at
            - group_id
            - is_group
            - archived
            - archived_at
            - order
            - collapsed

    # The childCategoryObject is a categoryObject without a 
    # `children` attribute. This ensures that only non-group categories
    # are added to a category group
    childCategoryObject:
      type: object
      x-internal: true # Don't display in schemas section of docs
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int32
          nullable: false
          description: System defined unique ID for the category
        name:
          type: string
          nullable: false
          description: The name of the category
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
          description: Category description, or `null` if none is set
          maxLength: 200
        is_income:
          type: boolean
          nullable: false
          description: If true, transactions in this category are treated as
            income. (Inherited from the Category Group).
        exclude_from_budget:
          type: boolean
          nullable: false
          description: If true, transactions in this category are excluded from
            the budget. (Inherited from Category Group).
        exclude_from_totals:
          type: boolean
          nullable: false
          description: If true, transactions in this category are excluded from
            totals. (Inherited from Category Group).
        updated_at:
          type: string
          format: date-time
          nullable: false
          description: Date and time the category was last updated (ISO 8601
            extended format).
        created_at:
          type: string
          format: date-time
          nullable: false
          description: Date and time the category was created (ISO 8601 extended
            format).
        group_id:
          type: integer
          format: int64
          nullable: true
          description: ID of the category group this category belongs to, or
            `null` if it does not belong to a group, or is itself a group.
        is_group:
          type: boolean
          enum:
            - false
          description: Always false for categories that belong to a category
            group
        archived:
          type: boolean
          description: If true, the category is archived and hidden in relevant
            areas of the Lunch Money app.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Date and time the category was last archived ( ISO 8601
            extended format).
        order:
          type: integer
          nullable: true
          description: Position of the category on the categories page in the
            Lunch Money app. For grouped categories, the order is relative to
            the others in the same group.
        collapsed:
          type: boolean
          nullable: false
          description: Always `false` for a child category. Child categories
            cannot be collapsed.
      required:
        - id
        - name
        - description
        - is_income
        - exclude_from_budget
        - exclude_from_totals
        - updated_at
        - created_at
        - group_id
        - is_group
        - archived
        - archived_at
        - order
        - collapsed

     # The request object for POST /categories
    # Prevent user from submitting any system created fields in a POST request
    createCategoryRequestObject:
      type: object
      additionalProperties: false
      x-internal: true
      properties:
        name:
          type: string
          nullable: false
          description: >-
            Name of the new category. Must be between 1 and 100 characters.

            The name must not match the name of any existing categories or category
            groups.
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
          default: null
          description: Description of the category. Maximum length is 200
            characters.
          minLength: 0 # Allow empty strings
          maxLength: 200
        is_income:
          type: boolean
          nullable: false
          default: false
          description: If `true`, transactions in this category are treated as
            income. (See [Category
            Properties](https://support.lunchmoney.app/setup/categories/category-properties)
            for details)
        exclude_from_budget:
          type: boolean
          nullable: false
          default: false
          description: If `true`, transactions in this category are excluded
            from the budget. (See [Category
            Properties](https://support.lunchmoney.app/setup/categories/category-properties)
            for details)
        exclude_from_totals:
          type: boolean
          nullable: false
          default: false
          description: If `true`, transactions in this category are excluded
            from totals. (See [Category
            Properties](https://support.lunchmoney.app/setup/categories/category-properties)
            for details)
        is_group:
          type: boolean
          nullable: false
          default: false
          description: If `true`, this category will be created as a category
            group.
        group_id:
          type: integer
          format: int64
          nullable: true
          default: null
          description: If set to the ID of an existing category group, the new
            category will be added to that group. Cannot be used if `is_group`
            is true.
        archived:
          type: boolean
          default: false
          description: If `true`, the category is archived and in relevant areas
            of the Lunch Money app.
        children:
          type: array
          nullable: false
          description: List of categories to include in the new category group.
            This field should only be set if `is_group` is also set to true.<br>
            You may provide existing category objects, existing category IDs, or
            names for new categories to add to the group. Categories or IDs must
            already exist and cannot be category groups. Categories that already
            belong to another group will be moved. If strings are provided, they
            will be used as names for new categories added to the group. The
            request will fail if any provided name already exists.<br> You may
            mix category objects, IDs, and new category names in the same
            request.
          items:
            oneOf:
              - type: integer
                description: "ID of an existing category."
              - type: string
                description: "Name of a new child category to be created."
                maxLength: 100
              - $ref: "#/components/schemas/categoryObject"
        order:
          type: integer
          nullable: true
          description: Position of the category on the categories page in the
            Lunch Money app. For grouped categories, the order is relative to
            other categories in the same group.<br>While this property can be
            set via the API, it is usually managed by the user in the Lunch
            Money app.
        collapsed:
          type: boolean
          nullable: true
          description: If `true`, the category group appears collapsed in the
            Lunch Money app. Can only be set to `true` for category
            groups.<br>While this property can be set via the API, it is usually
            managed by the user in the Lunch Money app.
      required:
        - name


    # Request object for a PUT /categories/:id request
    # Tolerates a request object that includes system created fields from a
    # previous GET request, but these are essentially ignored
    updateCategoryRequestObject:
      type: object
      x-internal: true
      additionalProperties: false
      properties:
        name:
          type: string
          nullable: false
          description: If set, updates the category name. Must be between 1 and
            100 characters.
          minLength: 1
          maxLength: 100
          x-updatable: true
        description:
          type: string
          nullable: true
          description: If set, updates the category description. Must not exceed
            200 characters.
          minLength: 0 # Allow empty strings
          maxLength: 200
          x-updatable: true
        is_income:
          type: boolean
          nullable: false
          description: If set, determines whether transactions in this category
            are treated as income. (See [Category
            Properties](https://support.lunchmoney.app/setup/categories/category-properties)
            for details)
          x-updatable: true
        exclude_from_budget:
          type: boolean
          nullable: false
          description: If set, determines whether transactions in this category
            are excluded from budgets. (See [Category
            Properties](https://support.lunchmoney.app/setup/categories/category-properties)
            for details)
          x-updatable: true
        exclude_from_totals:
          type: boolean
          nullable: false
          description: If set, determines whether transactions in this category
            are excluded from totals. (See [Category
            Properties](https://support.lunchmoney.app/setup/categories/category-properties)
            for details)
          x-updatable: true
        archived:
          type: boolean
          description: If set, determines whether this category is archived.
          x-updatable: true
        group_id:
          type: integer
          format: int64
          nullable: true
          description: If set to the ID of an existing category group, and this
            category is not itself a category group, this category will be
            assigned to that group.
          x-updatable: true
        is_group:
          type: boolean
          nullable: true
          default: false
          description: This property is tolerated but cannot be changed. This
            API cannot be used to convert a category into a category group or
            vice versa.
        children:
          type: array
          nullable: false
          description: List of existing category objects, existing category IDs,
            or names of new categories to add to the category group. This
            attribute should only be set when modifying an existing category
            group.<br> Categories or IDs must already exist and must not already
            belong to a category group. Categories that already belong to
            another category group will be moved. If strings are specified, they
            will be used as names for new categories added to the group. The
            request will fail if any provided name matches an existing category
            name.<br> You may mix full category objects, IDs, and new category
            names in the same request.
          x-updatable: true
          items:
            oneOf:
              - type: integer
                description: "ID of an existing category."
              - type: string
                description: "Name of a new child category to be created."
                maxLength: 100
              - $ref: "#/components/schemas/categoryObject"
        order:
          type: integer
          nullable: true
          description: Position of the category on the categories page in the
            Lunch Money app. For categories within a category group, the order
            is relative to the other categories in the group.<br>While this
            property can be set via the API, it is generally managed by the user
            in the Lunch Money app.
          x-updatable: true
        collapsed:
          type: boolean
          nullable: true
          description: If `true`, the category is collapsed in the Lunch Money
            app.<br>While this property can be set via the API it is generally
            set by the user in the Lunch Money app.
          x-updatable: true
        id:
          type: integer
          format: int64
          description: System defined unique identifier for the category.
            Ignored if set.
          x-updatable: false
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: System set date and time of when the category was last
            archived (in the ISO 8601 extended format). Provide an ISO 8601
            extended datetime or `null` to clear it.
          x-updatable: true
        updated_at:
          type: string
          format: date-time
          nullable: false
          description: System set date and time of when the category was last
            updated (in the ISO 8601 extended format). Ignored if set.
          x-updatable: false
        created_at:
          type: string
          format: date-time
          nullable: false
          description: System set date and time of when the category was created
            (in the ISO 8601 extended format). Ignored if set.
          x-updatable: false

    # The response object for a DELETE /category request with dependencies
    deleteCategoryResponseWithDependencies:
      type: object
      x-internal: true
      additionalProperties: false
      properties:
        category_name:
          type: string
          description: The name of the category
        dependents:
          type: object
          properties:
            budget:
              type: integer
              description: The number of budgets depending on the category
            category_rules:
              type: integer
              description: The number of category rules depending on the
                category
            transactions:
              type: integer
              description: The number of transactions depending on the category
            children:
              type: integer
              description: The number of child categories in the category group
            recurring:
              type: integer
              description: The number of recurring transactions depending on the
                category
            plaid_cats:
              type: integer
              description: The number of auto created categories based on Plaid
                categories
          required:
            - budget
            - category_rules
            - transactions
            - children
            - recurring
            - plaid_cats
      required:
        - category_name
        - dependents

    # Manual crypto balance object
    cryptoManualObject:
      type: object
      title: manual crypto object
      x-internal: true
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int32
          description: System defined unique ID for the manual crypto balance
        name:
          type: string
          minLength: 1
          maxLength: 45
          description: User-defined name for the crypto asset
        display_name:
          type: string
          nullable: true
          description: Optional display name for the crypto asset. If `null`,
            clients may derive a display name from `institution_name` + `name`.
        institution_name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 50
          description: Institution or wallet provider display name
        balance:
          type: string
          pattern: ^-?\d+(\.\d{1,18})?$
          description: Current balance in numeric format to 18 decimal places
        symbol:
          type: string
          minLength: 1
          maxLength: 25
          description: Cryptocurrency symbol
        coingecko_id:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
          description: CoinGecko identifier associated with this balance
        to_base:
          type: number
          description: Balance converted to the user's primary currency
        balance_as_of:
          type: string
          format: date-time
          nullable: true
          description: Date/time the balance was last updated in ISO 8601
            extended format
        created_by_name:
          type: string
          nullable: true
          description: Name of the user who created the crypto asset
        created_at:
          type: string
          format: date-time
          description: Date/time the crypto asset was created in ISO 8601
            extended format
        updated_at:
          type: string
          format: date-time
          description: Date/time the crypto asset was last updated in ISO 8601
            extended format
      required:
        - id
        - name
        - display_name
        - institution_name
        - balance
        - symbol
        - coingecko_id
        - to_base
        - balance_as_of
        - created_by_name
        - created_at
        - updated_at

    # Synced per-symbol balance nested under a synced crypto account
    cryptoSyncedBalance:
      type: object
      title: synced crypto balance object
      x-internal: true
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 45
          description: The name of the crypto asset
        balance:
          type: string
          pattern: ^-?\d+(\.\d{1,18})?$
          description: Current balance in numeric format to 18 decimal places
        symbol:
          type: string
          minLength: 1
          maxLength: 25
          description: Symbol of the currency held in the synced account
        coingecko_id:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
          description: CoinGecko identifier associated with this balance
        to_base:
          type: number
          description: Balance converted to the user's primary currency
        balance_as_of:
          type: string
          format: date-time
          nullable: true
          description: Date/time the balance was last updated in ISO 8601
            extended format
        updated_at:
          type: string
          format: date-time
          description: Date/time the crypto asset was last updated in ISO 8601
            extended format
      required:
        - name
        - balance
        - symbol
        - coingecko_id
        - to_base

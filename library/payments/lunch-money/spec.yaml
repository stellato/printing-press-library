                      amount: "19.99"
                      payee: Test Payee 3
                      manual_account_id: 219807
                      external_id: A658214
                      notes: API Test created Transaction
                      custom_metadata:
                        note: API Test Added Custom MetaData
                        testNumber: 42
                        testBool: false
                        testArray:
                          - 1
                          - foo
                          - false
                          - 42.42
                        testObject:
                          foo: bar
              duplicate external_id:
                value:
                  transactions:
                    - date: "2024-12-01"
                      amount: "19.99"

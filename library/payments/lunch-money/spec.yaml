                      category group
        "401":
          $ref: "#/components/responses/unauthorizedToken"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponseObject"
              example:
                message: Not Found
                errors:
                  - errMsg: "There is no category with the id: 543210."
        "429":
          $ref: "#/components/responses/rateLimited"
        "500":

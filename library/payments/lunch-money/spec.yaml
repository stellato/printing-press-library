        to the account currency for manual/Plaid accounts, or the user's primary
        currency for crypto/deleted accounts.<br><br>

        `symbol` is optional for `crypto_manual` accounts, tolerated for `deleted`
        accounts, and invalid for `manual` or `plaid` accounts.<br><br>

        `crypto_balance` may be provided for `crypto_manual` and `deleted` accounts,
        and is invalid for `manual` or `plaid` accounts.<br><br>

        Use `PUT /v2/balance_history/deleted/{account_id}/details` to update
        deleted-source metadata.

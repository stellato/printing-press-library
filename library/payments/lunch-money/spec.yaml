        Upsert one or more historical balance entries for a single manual, Plaid,
        manual crypto, or deleted acount. Crypto synced accounts require an additional `symbol` path parameter.<br><br>

        The `account_type` path parameter identifies the the type of account and the
        `account_id` path parameter identifies the specific id for that account type.<br><br>


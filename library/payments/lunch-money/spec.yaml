  # These responses are defined primarily to provide examples in the docs
  responses:
    unauthorizedToken:
      description: Unauthorized. This error occurs when an invalid API token is
        passed to the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/errorResponseObject"
          example:
            message: Unauthorized
            errors:
              - errMsg: Access token does not exist.
    rateLimited:
      description: Too Many Requests. Retry your request after the number of
        seconds specified in the retry-after header.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/errorResponseObject"
          example:
            message: Too Many Requests
            errors:
              - errMsg: Too many requests, please try again later.
    serverError:
      description: Internal Server Error. Contact support.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/errorResponseObject"
          example:
            message: Internal Server Error
            errors:
              - errMsg: Currently in maintenance mode. Please try again in a few minutes.
  
  securitySchemes:
    bearerSecurity:
      type: http
      description: Bearer access token from https://my.lunchmoney.app/developers. The same token works against the live API and the static mock server (mock.lunchmoney.dev/v2 accepts any 11+ char bearer).
      scheme: bearer
      bearerFormat: JWT
      x-auth-env-vars:
        - LUNCHMONEY_ACCESS_TOKEN
        - LUNCHMONEY_API_KEY
        - LUNCHMONEY_TOKEN
        - LUNCHMONEY_API_TOKEN
        - LUNCH_MONEY_API_KEY
      x-auth-key-url: https://my.lunchmoney.app/developers
      x-auth-title: Lunch Money Access Token
      x-auth-description: Bearer token from the Lunch Money developers page. The CLI accepts five env-var names for ecosystem compatibility; LUNCHMONEY_ACCESS_TOKEN is the canonical convention used by the official docs and the Python lunchable client.
    cookieAuth:
      type: apiKey
      in: cookie
      name: _lm_access_token

paths:
  /me:
    get:
      tags:
        - me
      summary: Get current user
      description: Get details about the user associated with the supplied
        authorization token.
      operationId: getMe
      parameters: []
      responses:
        "200":
          description: The User Object associated with the authorized token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/userObject"
              example:
                name: User 1
                email: user-1@lunchmoney.dev
                id: 18328
                account_id: 18221
                budget_name: \U0001F3E0 Family budget
                primary_currency: usd
                api_key_label: Side project dev key
        "401":
          $ref: "#/components/responses/unauthorizedToken"
        "429":
          $ref: "#/components/responses/rateLimited"
        "500":
          $ref: "#/components/responses/serverError"
  /summary:
    get:
      tags:
        - summary
      summary: Get summary
      description: Retrieves a summary of the user's budget. Use this endpoint
        to access budget configuration details and performance for a specified
        date range.<p> Use the [/budgets](#tag/budgets) endpoint to manage
        budget objects.
      
      operationId: getBudgetSummary
      parameters:
        - in: query
          name: start_date
          description: Start of date range in ISO 8601 date format (YYYY-MM-DD).
          required: true
          schema:
            type: string
            format: date
          examples:
            "aligned monthly":
              summary: "Start date for monthly budget period"
              description: "First day of month for aligned budget periods"
              value: "2025-07-01"
            "not aligned":
              summary: "Start date for non-aligned period"
              description: "Date that doesn't align with budget periods"
              value: "2025-07-02"
        - in: query
          name: end_date
          description: "End of date range in ISO 8601 date format (YYYY-MM-DD)."
          required: true
          schema:
            type: string
            format: date
          examples:
            "aligned monthly":
              summary: "End date for monthly budget period"
              description: "Last day of month for aligned budget periods"
              value: "2025-08-31"
            "not aligned":
              summary: "End date for non-aligned period"
              description: "Date that doesn't align with budget periods"
              value: "2025-08-27"
        - in: query
          name: include_exclude_from_budgets
          description: Enable to include categories that have the 'Exclude from
            Budgets' flag set in the returned `categories` array.
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: include_occurrences
          description: Enable to include an `occurrences` array for each
            category in an aligned response. Each array will include an object
            for each budget period that falls within the specified date range
            which includes details on the activity for the budget period.
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: include_past_budget_dates
          description: "Enable to include the three budget occurrences prior to
            the start date in the `occurrences` array for each category in an
            aligned response. This property is ignored if `include_occurrences`
            is not also set to `true`."
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: include_totals
          description: "Enable to include a top-level `totals` section that
            summarizes the inflow and outflow across all transactions for the
            specified date range."
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: include_rollover_pool
          description: "Enable to include a `rollover_pool` section that
            summarizes the current rollover pool balance and all previous
            adjustments."
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: "Summary of the user's budget for the specified date
            range."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/summaryResponseObject"

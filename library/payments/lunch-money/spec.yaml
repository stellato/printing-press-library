                value:
                  balances:
                    - date: "2026-03-01"
                      balance: "56011.1200"
                      symbol: btc
                      crypto_balance: "0.852341920145782301"
              deleted account bulk upsert:
                value:
                  balances:
                    - date: "2026-03-01"
                      symbol: btc
                      crypto_balance: "0.020000000000000000"
                      currency: usd
                      balance: "1255.0000"

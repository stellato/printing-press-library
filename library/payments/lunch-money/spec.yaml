                      amount: 15.00
                      payee: Lunch with James
                      notes: Cash Transaction
                      category_id: 315163
                    - date: "2024-11-01"
                      amount: "-9.99"
                      payee: me
                      notes: Interest from Investment Account Cash
                      status: unreviewed
              with external_id and custom_metadata:
                value:
                  transactions:

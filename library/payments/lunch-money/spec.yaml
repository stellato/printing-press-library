  /budgets:
    put:
      tags:
        - budgets
      summary: Upsert budget
      description: |-
        Create or update a budget for a category and period.<p>
        If a budget already exists for the specified `start_date` and `category_id`, the `amount` (and optional `currency` and `notes`) are updated; otherwise a new budget entry is created.<p>

        Note that `start_date` **must** be a valid budget period start for the account (based on the account's
        budget period settings). If an invalid `start_date` is provided, the request will fail with an error that indicates what the previous and next valid start dates are.<p>

        Use the [budgets/settings](#tag/budgets/GET/budgets/settings) endpoint to view the account's budget settings.<br>
        To view details for existing budgets, use the [summary](#tag/summary) endpoint.
      operationId: upsertBudget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/upsertBudgetRequestObject"
            example:
              start_date: "2025-01-01"
              category_id: 315177
              amount: 500
              currency: "usd"
              notes: "Monthly groceries"
      responses:
        "200":
          description: Budget upserted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/budgetUpsertResponseObject"
              example:
                category_id: 315177
                start_date: "2025-01-01"
                amount: 500
                currency: "usd"
                to_base: 500.0
                notes: "Monthly groceries"
        "400":
          description: Bad Request (invalid period start, invalid category, or
            validation failure)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/budgetInvalidPeriodErrorObject"
                  - $ref: "#/components/schemas/errorResponseObject"
              examples:
                invalid period:
                  summary: Start date not a valid budget period start
                  value:
                    message: Invalid Request
                    errors:
                      - errMsg: "The requested start date is not a valid budget period start for this account."
                        requested_start_date: "2025-01-15"
                        previous_valid_start_date: "2025-01-01"
                        next_valid_start_date: "2025-02-01"
                validation error:
                  summary: Bad Category ID
                  value:
                    message: Invalid Request Body
                    errors:
                      - errMsg: "Category ID does not exist"
        "401":
          $ref: "#/components/responses/unauthorizedToken"
        "429":
          $ref: "#/components/responses/rateLimited"
        "500":
          $ref: "#/components/responses/serverError"
    delete:
      tags:
        - budgets
      summary: Delete budget
      description: Removes the budget for the given category and period. If
        there already is no budget set for that period, the request still
        succeeds (idempotent).<p> Note that `start_date` **must** be a valid
        budget period start for the account (based on the account's budget
        period settings). If an invalid `start_date` is provided, the request
        will fail with an error that indicates what the previous and next valid
        start dates are.<p> Use the
        [budgets/settings](#tag/budgets/GET/budgets/settings) endpoint to view
        the account's budget settings.<br> To view details for existing budgets,
        use the [summary](#tag/summary) endpoint.
      operationId: deleteBudget
      parameters:
        - in: query
          name: category_id
          required: true
          description: Category ID of the budget to delete
          schema:
            type: integer
            format: int32
        - in: query
          name: start_date
          required: true
          description: Start date of the budget period in ISO 8601 date format
            (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "204":
          description: Budget deleted (or no budget existed for the given
            category and period)
        "400":
          description: Bad Request (invalid period start, invalid category, or
            validation failure)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/budgetInvalidPeriodErrorObject"
                  - $ref: "#/components/schemas/errorResponseObject"
              examples:
                invalid period:
                  summary: Bad Category ID
                  value:
                    message: Invalid Request
                    errors:
                      - errMsg: "The requested start date is not a valid budget period start for this account."
                        requested_start_date: "2025-01-15"
                        previous_valid_start_date: "2025-01-01"
                        next_valid_start_date: "2025-02-01"
                validation error:
                  summary: Invalid request body
                  value:
                    message: Invalid Request Body
                    errors:
                      - errMsg: "Category ID does not exist"
        "401":
          $ref: "#/components/responses/unauthorizedToken"
        "429":
          $ref: "#/components/responses/rateLimited"
        "500":
          $ref: "#/components/responses/serverError"

